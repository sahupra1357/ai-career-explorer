  field_id: geology
  name: Geology
  plain_english: Geologists study the Earth itself — its rocks, minerals, structure,
    and history over billions of years. The field supports the energy industry, environmental
    consulting, natural hazard assessment, and the hunt for critical minerals needed
    for batteries and electronics.
  sub_areas:
  - name: Petrology & Mineralogy
    description: Identifying and studying rocks and minerals to understand the processes
      that formed them.
  - name: Hydrogeology
    description: Tracking how water moves through underground rock and soil layers
      to manage water resources.
  - name: Geophysics
    description: Using seismic waves, gravity, and magnetic fields to image structures
      deep inside the Earth.
  - name: Environmental Geology
    description: Assessing geological hazards like earthquakes, landslides, and contaminated
      sites for remediation.
