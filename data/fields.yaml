  field_id: biochemistry
  name: Biochemistry
  plain_english: Biochemists study the chemical processes that happen inside living
    cells — how proteins fold, how DNA replicates, how enzymes catalyze reactions,
    and how drugs interact with biological targets. It is the molecular language that
    connects chemistry to medicine and biology.
  sub_areas:
  - name: Structural Biology
    description: Determining the 3D shapes of proteins and nucleic acids to understand
      how they function.
  - name: Enzymology & Metabolism
    description: Studying how enzymes speed up the chemical reactions that keep cells
      alive.
  - name: Drug Discovery & Pharmacology
    description: Identifying biological targets for new drugs and testing how molecules
      interact with them.
  - name: Molecular Genetics
    description: Investigating how genes are expressed, regulated, and mutated at
      the molecular level.
