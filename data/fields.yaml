    - Operations Manager
    - Supply Chain Analyst
    - Management Consultant
    - Process Improvement Engineer
    salary_range:
      min: 68000
      max: 125000
      currency: USD
      source_year: 2024
      region: US national median
    outlook: 11% growth 2022-2032, faster than average (BLS)
    outlook_pct: 11.0
  personality_fit:
    math_intensity: 4
    lab_intensity: 1
    coding_intensity: 3
    people_facing: 4
    fit_description: Industrial engineering attracts students who are bothered by
      inefficiency and enjoy improving systems rather than building physical products.
