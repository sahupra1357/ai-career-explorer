  field_id: computer-engineering
  name: Computer Engineering
  plain_english: Computer engineers design the hardware that runs software — processors,
    memory chips, graphics cards, and embedded systems. They sit at the boundary between
    electrical engineering and computer science, working on both the physical circuits
    and the low-level code that controls them.
  sub_areas:
  - name: Processor & VLSI Design
    description: Designing the chips and circuits that form the core of every computing
      device.
  - name: Embedded Systems
    description: Programming microcontrollers that run inside physical products like
      cars, medical devices, and appliances.
  - name: Computer Architecture
    description: Designing how a processor is organized to maximize speed, efficiency,
      and capability.
  - name: Hardware Security
    description: Protecting circuits and embedded systems from physical and side-channel
      attacks.
  undergrad_path:
    high_school_prereqs:
