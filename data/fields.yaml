  field_id: materials-science
  name: Materials Science
  plain_english: Materials scientists discover and engineer the substances that everything
    is made from — metals, ceramics, polymers, semiconductors, and nanomaterials.
    The batteries in electric vehicles, the chips in your phone, and the carbon fiber
    in aircraft all exist because of materials science breakthroughs.
  sub_areas:
  - name: Nanomaterials
    description: Engineering materials at the atomic scale to create properties impossible
      in bulk form.
  - name: Electronic Materials & Semiconductors
    description: Designing the materials that make transistors, solar cells, and displays
      work.
  - name: Biomaterials
    description: Creating materials that safely interact with the human body for implants
      and drug delivery.
  - name: Structural Materials
    description: Developing stronger, lighter metals and composites for aerospace,
      automotive, and construction.
