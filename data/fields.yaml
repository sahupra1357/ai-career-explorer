  field_id: industrial-engineering
  name: Industrial Engineering
  plain_english: Industrial engineers figure out how to make systems — factories,
    hospitals, supply chains, airports — run as efficiently as possible. Where other
    engineers design specific products, industrial engineers design the processes
    and workflows that produce and deliver everything else.
  sub_areas:
  - name: Operations Research
    description: Using mathematical optimization to find the best solution among many
      complex trade-offs.
  - name: Supply Chain & Logistics
    description: Designing the systems that move goods from raw materials to customers
      efficiently.
  - name: Human Factors & Ergonomics
    description: Making workplaces, tools, and systems safer and more intuitive for
      the people using them.
  - name: Quality Engineering
    description: Building processes that consistently produce products and services
      at the required quality level.
  undergrad_path:
    high_school_prereqs:
    - AP Calculus BC
    - AP Statistics
    - AP Computer Science (helpful)
    common_majors:
