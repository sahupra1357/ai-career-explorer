    description: Designing homes, offices, and mixed-use buildings from concept through
      construction.
  - name: Urban Design & Planning
    description: Shaping how neighborhoods and city districts look, function, and
      grow over time.
  - name: Sustainable / Green Architecture
    description: Designing buildings that minimize energy use, carbon emissions, and
      environmental impact.
  - name: Historic Preservation
