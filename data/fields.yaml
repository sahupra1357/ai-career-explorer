# AI Career Exploration — STEM Field Knowledge Base
# Schema version: 1.0
#
# To add a new field entry, run:  make add-field
# To validate all entries, run:   make validate-kb
#
# Salary data source: Bureau of Labor Statistics Occupational Outlook Handbook
# Outlook data source: BLS OOH projections (https://bls.gov/ooh)
#
# Each entry must pass FieldEntry Pydantic validation at startup.
# Mandatory fields: schema_version, field_id, name, plain_english,
#   sub_areas (3-5), undergrad_path, career_outcomes, personality_fit,
#   follow_on_questions (3-5).
# Leave adjacent_fields as [] — populate in a second pass after all entries exist.

fields: []

# ── Template (copy this block to add a new entry manually) ────────────────────
#
# - schema_version: "1.0"
#   field_id: your-field-slug           # lowercase, hyphens, e.g. biomedical-engineering
#   name: Your Field Name
#   plain_english: >
#     2-3 sentence ELI16 description. What does someone in this field actually do
#     day to day? Use plain language a high schooler can follow.
#   sub_areas:
#     - name: Sub-area 1
#       description: One sentence.
#     - name: Sub-area 2
#       description: One sentence.
#     - name: Sub-area 3
#       description: One sentence.
#   undergrad_path:
#     high_school_prereqs:
#       - Calculus or Pre-Calculus
#       - Biology (AP recommended)
#     common_majors:
#       - Major Name
#     key_courses:
#       - Course Name
#       - Course Name
#   career_outcomes:
#     common_roles:
#       - Job Title 1
#       - Job Title 2
#       - Job Title 3
#     salary_range:
#       min: 60000
#       max: 120000
#       currency: USD
#       source_year: 2024    # Year of BLS data used
#       region: US national median
#     outlook: "15% growth 2022-2032, faster than average (BLS)"
#     outlook_pct: 15.0     # Numeric value for programmatic use; null if unavailable
#   personality_fit:
#     math_intensity: 3     # 1=low, 5=high
#     lab_intensity: 2
#     coding_intensity: 4
#     people_facing: 2
#     fit_description: >
#       2-3 sentences on who thrives here. What mindset, working style, or
#       academic strength predicts success in this field?
#   adjacent_fields: []     # Leave empty — populate in second pass after all entries
#   follow_on_questions:
#     - "Question a student might ask to go deeper?"
#     - "Another specific follow-on question?"
#     - "A third question about this field?"
