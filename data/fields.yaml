  field_id: statistics
  name: Statistics
  plain_english: Statisticians design experiments, analyze data, and quantify uncertainty
    to help scientists, businesses, and governments make better decisions. Unlike
    data science, statistics emphasizes rigorous mathematical theory — understanding
    why methods work, not just how to apply them.
  sub_areas:
