    description: Designing clinical trials and analyzing medical data to test whether
      treatments actually work.
  - name: Bayesian Statistics
    description: Using prior knowledge combined with new data to update beliefs and
      make probabilistic predictions.
  - name: Statistical Machine Learning
    description: Developing the mathematical foundations behind algorithms that learn
      from data.
  - name: Survey Sampling & Official Statistics
    description: Designing surveys and analyzing population data for government agencies
      and research organizations.
