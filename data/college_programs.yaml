programs:
  - program_id: berkeley-computer-science
    course_name: Computer Science
    aliases: [cs, software engineering, computing]
    college_name: University of California, Berkeley
    city: Berkeley
    state: CA
    lat: 37.8719
    lon: -122.2585
    ranking_score: 98
    degree: BA Computer Science / BS Electrical Engineering and Computer Sciences
    delivery: On campus
    overview: Berkeley offers computer science through Letters & Science and EECS, with strong foundations in programming, discrete math, systems, theory, AI, and upper-division electives.
    curriculum_summary: Students build from programming and mathematical foundations into architecture, algorithms, systems, probability, and advanced electives such as AI, databases, security, graphics, and software engineering.
    semester_plan:
      - term: Year 1
        focus: Programming and math foundation
        courses: [Structure and Interpretation of Computer Programs, Data Structures, Calculus, Reading and Composition]
      - term: Year 2
        focus: Core theory and systems preparation
        courses: [Discrete Mathematics and Probability, Computer Architecture, Linear Algebra, Lower-division breadth]
      - term: Year 3
        focus: Upper-division CS depth
        courses: [Algorithms, Operating Systems or Databases, Technical electives, Breadth requirements]
      - term: Year 4
        focus: Specialization and capstone-level work
        courses: [Advanced CS electives, Project or research options, Remaining degree requirements]
    required_papers: [High school transcript, UC application essays, Activities list, Test scores if applicable under current UC policy]
    admission_factors: [A-G course completion, GPA and course rigor, Math readiness, Evidence of sustained technical interest, Contextual review]
    fees:
      in_state_tuition:
        amount: 15900
        label: Estimated annual systemwide tuition and fees for California residents
      out_of_state_tuition:
        amount: 50400
        label: Estimated annual tuition and fees for nonresidents
      mandatory_fees:
        amount: 1500
        label: Campus fees vary by year
      notes: Confirm the current annual cost of attendance on Berkeley's financial aid site before applying.
      source_url: https://financialaid.berkeley.edu/how-aid-works/student-budgets-cost-of-attendance/
    decision_factors: [Excellent national reputation, Highly competitive admission, Strong research ecosystem, High Bay Area living costs]
    sources:
      - label: Berkeley EECS undergraduate degree information
        url: https://eecs.berkeley.edu/academics/undergraduate/
      - label: Berkeley Computer Science major information
        url: https://ls.berkeley.edu/advising/academic-progress/major-requirements/computer-science
      - label: Berkeley cost of attendance
        url: https://financialaid.berkeley.edu/how-aid-works/student-budgets-cost-of-attendance/

