services:
  - type: web
    name: ai-career-explorer
    runtime: docker
    plan: free
    envVars:
      # --- LLM provider switch: set LLM_PROVIDER=openai or anthropic in dashboard ---
      - key: LLM_PROVIDER
        value: "openai"
      - key: OPENAI_API_KEY
        sync: false        # set manually in Render dashboard — never committed
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: ANTHROPIC_API_KEY
        sync: false        # set manually in Render dashboard — never committed
      - key: CLAUDE_MODEL
        value: "claude-sonnet-4-6"
      - key: MOCK_CLAUDE
        value: "0"
      - key: CLAUDE_TIMEOUT_S
        value: "15"
      - key: COURSE_SEARCH_MODE
        value: "agent"
      - key: SEARCH_PROVIDER
        value: "tavily"
      - key: TAVILY_API_KEY
        sync: false        # set manually in Render dashboard — never committed
    healthCheckPath: /health
